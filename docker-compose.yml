name: backend

services:
  musicmixer:
    build: .
    image: ghcr.io/aaronw122/musicmixer:latest
    ports:
      - "8880:8880"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 3g
    env_file: .env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - musicmixer-data:/app/data
      - ${MODAL_TOML_PATH:-/root/.modal.toml}:/root/.modal.toml:ro
      - ${YT_COOKIES_PATH:-/root/musicmixer/yt-cookies.txt}:/app/yt-cookies.txt
      - yt-dlp-cache:/root/.cache/yt-dlp
  frontend:
    image: ghcr.io/aaronw122/musicmixer-frontend:latest
    ports:
      - "8080:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped


volumes:
  musicmixer-data:
  yt-dlp-cache:
  redis-data:
