services:
  musicmixer:
    build: .
    image: ghcr.io/aaronw122/musicmixer:latest
    ports:
      - "8880:8880"
    restart: unless-stopped
    mem_limit: 6g
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - musicmixer-data:/app/data
      - /home/lobo/.modal.toml:/root/.modal.toml:ro

volumes:
  musicmixer-data:
