name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [frontend-deploy]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: aaronw122/musicMixer-frontend
          path: frontend

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Stage frontend build
        run: cp -r frontend/dist static-build/

      - name: Verify frontend build
        run: test -f static-build/index.html || exit 1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/musicmixer:latest
            ghcr.io/${{ github.repository_owner }}/musicmixer:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to homeserver
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOMESERVER_HOST }}
          username: ${{ secrets.HOMESERVER_USER }}
          key: ${{ secrets.HOMESERVER_SSH_KEY }}
          script: cd ~/musicmixer && docker compose pull && docker compose up -d --remove-orphans

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOMESERVER_HOST }}
          username: ${{ secrets.HOMESERVER_USER }}
          key: ${{ secrets.HOMESERVER_SSH_KEY }}
          script: sleep 15 && curl -f http://localhost:8880/health || exit 1
