name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [frontend-deploy]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: aaronw122/musicMixer-frontend
          token: ${{ secrets.DEPLOY_PAT }}
          path: frontend

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Build frontend
        run: cd frontend && bun run build
        env:
          VITE_GOATCOUNTER_SITE: ${{ secrets.VITE_GOATCOUNTER_SITE }}

      - name: Stage frontend build
        run: cp -r frontend/dist static-build/

      - name: Verify frontend build
        run: test -f static-build/index.html || exit 1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/musicmixer:latest
            ghcr.io/${{ github.repository_owner }}/musicmixer:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync docker-compose.yml to Hetzner
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            root@${{ secrets.HETZNER_HOST }}:~/musicmixer/docker-compose.yml

      - name: Deploy to Hetzner
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            'cd ~/musicmixer && docker compose down --remove-orphans 2>/dev/null; docker ps -q --filter "publish=8880" | xargs -r docker rm -f; docker compose pull && docker compose up -d'

      - name: Post-deploy health check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            "sleep 15 && curl -f http://localhost:8880/health"

      - name: Prune stale images
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            'docker image prune -af'
