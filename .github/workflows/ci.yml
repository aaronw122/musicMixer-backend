name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      STEM_BACKEND: local

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # Keep in sync with Dockerfile system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1 rubberband-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Check lockfile is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --extra local --extra analysis

      - name: Run tests
        run: uv run pytest tests/ -m "not slow" -v --timeout=120
