name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Required: Settings init fails without this in CI (no .env file,
      # and the default "modal" triggers Modal imports)
      STEM_BACKEND: local

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # Source of truth for system deps: Dockerfile
        # Both install ffmpeg, libsndfile1, rubberband-cli — keep in sync.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1 rubberband-cli

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Check lockfile is up to date
        run: uv lock --check

      - name: Install dependencies (CPU-only torch to skip CUDA bloat)
        # local extra: audio-separator (needed when STEM_BACKEND=local)
        # Override torch index to CPU-only — tests don't need GPU
        run: uv sync --frozen --extra local --index-strategy unsafe-best-match
        env:
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: uv run pytest tests/ -m "not slow" -v --timeout=120
