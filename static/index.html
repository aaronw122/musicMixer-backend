<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musicMixer - Day 2</title>
    <style>
        /* Minimal styling -- replaced by React + Tailwind later */
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { margin-bottom: 4px; }
        .subtitle { color: #666; margin-top: 0; }
        label { display: block; margin-top: 16px; font-weight: 600; }
        input[type="file"], input[type="text"] { margin-top: 4px; }
        button { margin-top: 20px; padding: 10px 24px; font-size: 16px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 16px; color: #444; }
        #progress-container { margin-top: 12px; display: none; }
        #progress-bar { width: 100%; height: 24px; appearance: none; }
        #progress-bar::-webkit-progress-bar { background-color: #eee; border-radius: 4px; }
        #progress-bar::-webkit-progress-value { background-color: #4a90d9; border-radius: 4px; }
        #progress-detail { margin-top: 4px; font-size: 14px; color: #666; }
        #player { margin-top: 20px; display: none; }
        audio { width: 100%; }
        #explanation { margin-top: 8px; font-size: 14px; color: #555; font-style: italic; }
        .error { color: #c00; }
        #stem-player { margin-top: 32px; display: none; border-top: 1px solid #ddd; padding-top: 16px; }
        #stem-player h3 { margin-bottom: 8px; }
        .stem-section { margin-bottom: 16px; }
        .stem-section h4 { margin: 8px 0 4px; color: #555; }
        .stem-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .stem-item label { min-width: 60px; font-size: 14px; font-weight: 600; }
        .stem-item audio { flex: 1; height: 32px; }
    </style>
</head>
<body>
    <h1>musicMixer</h1>
    <p class="subtitle">Day 2: The Real Remix</p>

    <form id="remix-form">
        <label for="song_a">Song A (vocals source):</label>
        <input type="file" id="song_a" name="song_a" accept=".mp3,.wav" required>

        <label for="song_b">Song B (instrumentals source):</label>
        <input type="file" id="song_b" name="song_b" accept=".mp3,.wav" required>

        <label for="prompt">Prompt:</label>
        <input type="text" id="prompt" name="prompt" placeholder="Describe your remix..."
               style="width: 100%; padding: 8px;">

        <button type="submit" id="submit-btn">Create Remix</button>
    </form>

    <div id="status"></div>

    <div id="progress-container">
        <progress id="progress-bar" max="100" value="0"></progress>
        <div id="progress-detail"></div>
    </div>

    <div id="player">
        <h3>Your Remix</h3>
        <audio id="audio" controls></audio>
        <div id="explanation"></div>
    </div>

    <div id="stem-player">
        <h3>Debug: Individual Stems</h3>
        <div id="stem-list"></div>
    </div>

    <script>
        const form = document.getElementById('remix-form');
        const statusEl = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressDetail = document.getElementById('progress-detail');
        const player = document.getElementById('player');
        const audio = document.getElementById('audio');
        const explanationEl = document.getElementById('explanation');
        const submitBtn = document.getElementById('submit-btn');
        const stemPlayer = document.getElementById('stem-player');
        const stemList = document.getElementById('stem-list');

        let eventSource = null;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset UI
            player.style.display = 'none';
            stemPlayer.style.display = 'none';
            progressContainer.style.display = 'none';
            statusEl.className = '';
            statusEl.textContent = 'Uploading...';
            explanationEl.textContent = '';
            submitBtn.disabled = true;

            // Close any existing SSE connection
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }

            const formData = new FormData();
            formData.append('song_a', document.getElementById('song_a').files[0]);
            formData.append('song_b', document.getElementById('song_b').files[0]);
            formData.append('prompt', document.getElementById('prompt').value || '');

            try {
                const response = await fetch('/api/remix', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const sessionId = data.session_id;

                statusEl.textContent = 'Processing...';
                progressContainer.style.display = 'block';
                progressBar.value = 0;

                // Open SSE connection for progress events
                connectSSE(sessionId);

            } catch (err) {
                statusEl.textContent = `Error: ${err.message}`;
                statusEl.className = 'error';
                submitBtn.disabled = false;
            }
        });

        function connectSSE(sessionId) {
            eventSource = new EventSource(`/api/remix/${sessionId}/progress`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // Ignore keepalive events
                if (data.step === 'keepalive') {
                    return;
                }

                // Update progress bar
                if (data.progress >= 0 && data.progress <= 1) {
                    progressBar.value = Math.round(data.progress * 100);
                }

                // Update step description
                if (data.detail) {
                    progressDetail.textContent = data.detail;
                }

                // Handle completion
                if (data.step === 'complete') {
                    eventSource.close();
                    eventSource = null;

                    statusEl.textContent = 'Remix complete! Press play to listen.';
                    progressBar.value = 100;
                    progressDetail.textContent = 'Done!';

                    // Show audio player
                    audio.src = `/api/remix/${sessionId}/audio`;
                    player.style.display = 'block';

                    // Show explanation if available
                    if (data.explanation) {
                        explanationEl.textContent = data.explanation;
                    }

                    // Load debug stem player
                    loadStems(sessionId);

                    submitBtn.disabled = false;
                }

                // Handle error
                if (data.step === 'error') {
                    eventSource.close();
                    eventSource = null;

                    statusEl.textContent = `Error: ${data.detail}`;
                    statusEl.className = 'error';
                    progressContainer.style.display = 'none';
                    submitBtn.disabled = false;
                }
            };

            eventSource.onerror = () => {
                // EventSource will auto-reconnect, but if the session is done
                // we should stop trying
                if (eventSource && eventSource.readyState === EventSource.CLOSED) {
                    statusEl.textContent = 'Connection lost. Check status manually.';
                    statusEl.className = 'error';
                    submitBtn.disabled = false;
                }
            };
        }

        async function loadStems(sessionId) {
            try {
                const resp = await fetch(`/api/remix/${sessionId}/stems`);
                if (!resp.ok) return;

                const stems = await resp.json();
                stemList.innerHTML = '';

                const songLabels = { song_a: 'Song A', song_b: 'Song B' };

                for (const [song, stemNames] of Object.entries(stems)) {
                    if (stemNames.length === 0) continue;

                    const section = document.createElement('div');
                    section.className = 'stem-section';

                    const heading = document.createElement('h4');
                    heading.textContent = songLabels[song] || song;
                    section.appendChild(heading);

                    for (const name of stemNames) {
                        const item = document.createElement('div');
                        item.className = 'stem-item';

                        const label = document.createElement('label');
                        label.textContent = name;
                        item.appendChild(label);

                        const audioEl = document.createElement('audio');
                        audioEl.controls = true;
                        audioEl.preload = 'none';
                        audioEl.src = `/api/remix/${sessionId}/stems/${song}/${name}`;
                        item.appendChild(audioEl);

                        section.appendChild(item);
                    }

                    stemList.appendChild(section);
                }

                stemPlayer.style.display = 'block';
            } catch (err) {
                // Stem loading is best-effort for debug; don't show errors to user
            }
        }
    </script>
</body>
</html>
